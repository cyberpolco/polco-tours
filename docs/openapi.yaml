openapi: 3.0.3
info:
  title: POLCO TOURS API
  version: 0.14.0
  description: >
    DR-038 adds Insights & Decision Making: a new, read-only `insights`
    module (no new Prisma tables) composing existing booking/invoicing/
    assignment/fleet/ratings/visa data into one executive dashboard
    (GET /insights, new `insights.read` permission). Deliberately not a real
    BI/analytics engine -- utilization is a simple ratio (assigned-and-
    currently-scheduled ÷ total ACTIVE fleet), revenue is reported per
    currency and never combined across them. Two small additive methods
    elsewhere: `invoicingService.listAllForOrg` (staff-only, since
    invoice.read is also held by TOURIST for their own single invoice) and
    `assignmentService.listAllAssignments` (gated on assignment.write, the
    existing manager-only permission, since assignment.read is also held by
    self-service roles).


    DR-037 adds Customer Ratings & Feedback: a new ratings module
    (RatingCode/Review/ReviewSubjectRating, none of which existed before).
    Staff issue a single-use, expiring Rating Code once a booking's invoice
    is PAID (POST /bookings/{bookingId}/rating-code, rating.issue); a client
    later rates the assigned driver(s)/guide(s) and the agency overall via a
    public, session-less flow (bookingReference + Rating Code, mirroring the
    bookingReference + last-name "find my booking" pattern) -- not exposed
    as a REST route, only GET /ratings (rating.read, staff moderation/
    aggregate view) is new here. Ratings recompute live average scores on
    DriverProfile/GuideProfile/Organization, which now factor into
    assignment recommend-assignment's ordering for both drivers and guides
    (guides ranked there for the first time).


    DR-035 adds User Management: a full runtime permission-matrix editor.
    RolePermission (global, no organizationId/RLS, same precedent as
    TaxRate/CountryRegulation) is now the source of truth for what every
    role except SUPERADMIN grants -- rbac.ts's old static MATRIX is renamed
    DEFAULT_PERMISSIONS and only used to seed RolePermission once.
    SUPERADMIN stays a hardcoded, unconditional wildcard (never has
    RolePermission rows, can never be locked out); PLATFORM_ADMIN loses its
    own wildcard and becomes the first fully DB-editable admin role, seeded
    with every permission except country_regulation.write (still blocked
    unconditionally by DR-034's isCountryRegulationWriter). New
    PATCH /users/{userId} (edit name/email/phone/roles),
    POST /users/{userId}/reset-password (generate-and-reveal-once a new
    temporary password + mustChangePassword), and GET/PATCH /permissions
    (admin.all at the route, but PATCH additionally requires SUPERADMIN in
    the service layer -- PLATFORM_ADMIN passes the route gate and is
    rejected inside authService.setRolePermission). "Configure system
    settings" (the spec's third Super-Admin capability) is deliberately not
    built -- the user did not specify which settings it should cover.
    DR-034 adds Immigration Module + Country Regulations + Zambia/Zimbabwe
    expansion: TOUR_OPERATOR gains visa.process ("the Tour Operator is by
    default also a Visa Facilitator role"); a new platform-wide
    CountryRegulation (no organizationId/RLS, same precedent as TaxRate)
    under /country-regulations(/{country}), read via
    country_regulation.read (TOUR_OPERATOR/VISA_FACILITATOR, admins via
    '*'), write via country_regulation.write -- but the service layer's
    isCountryRegulationWriter additionally excludes PLATFORM_ADMIN, the
    first real behavioral gap between SUPERADMIN and PLATFORM_ADMIN in this
    app (rbac.ts's MATRIX wildcard can't express this alone). Two new real
    notification-triggering visa actions,
    /bookings/{bookingId}/travelers/{travelerId}/visa/(contact|
    request-documents), resolving the recipient via
    bookingService.getBookingForTraveler. Zambia (ZM) and Zimbabwe (ZW) are
    now real operable countries (packages/departures/tax), priced in the
    existing USD/EUR Currency values.
    DR-033 adds Itinerary Management: a new Itinerary (1:1 with a Booking,
    DRAFT -> IN_REVIEW -> APPROVED), ItineraryDay (per-day schedule), and
    lightweight Hotel/Restaurant reference entities under
    /bookings/{bookingId}/itinerary, /itineraries(/mine|/{id}(/review|
    /send-back|/approve|/days|/hotels|/restaurants)), /hotels, /restaurants.
    itinerary.read/write/approve are new permissions -- TOUR_OPERATOR holds
    all three (SUPERADMIN/PLATFORM_ADMIN stay undifferentiated, via '*');
    TOUR_GUIDE/DRIVER hold itinerary.read only, scoped to their own assigned
    departures.
    DR-032 removes the IMMIGRATION_OFFICER role and Officers admin tooling
    entirely (no longer needed): /immigration/visa-applications,
    /immigration/officers, and /users/{userId}/assign-country are gone,
    along with User.assignedCountry and the OfficerVisaView projection.
    VISA_FACILITATOR's own whole-org queue (/visa/queue, DR-031) is the
    remaining visa-overview surface for staff.
    DR-026 adds real user management: GET/POST /users (list/create, admin-
    only) and DELETE /users/{userId} (soft-delete/deactivate, admin-only).
    A user can hold several simultaneous roles now (Membership rows) --
    User.roles is the full held set, User.role stays the single "primary"
    role used unchanged by tourist/guest self-signup. Created accounts get
    a generated one-time password (returned once) and mustChangePassword;
    forced to change it at first sign-in via the staff dashboard (not
    enforced on /api/v1 itself).
    DR-025 adds resubmission: a REJECTED VisaApplication can be reset back
    to SUBMITTED via /bookings/{bookingId}/travelers/{travelerId}
    /visa/resubmit (visa.process, same anti-BOLA check as submit/decide).
    DecideVisaInput gains an optional reason, persisted as
    VisaApplicationView.rejectionReason only while REJECTED (cleared on
    resubmit or a later APPROVED decision); resubmissionCount is a
    display-only counter.
    DR-019 adds Phase 2 Increment 3 (visa documents): a per-traveler
    VisaApplication workflow (SUBMITTED -> APPROVED/REJECTED, resubmittable
    per DR-025) under
    /bookings/{bookingId}/travelers/{travelerId}/visa(/submit|/decide
    |/resubmit|/document), reusing documentsService.uploadDocument (kind: VISA).
    DR-018 adds Phase 2 Increment 2 (assignments): /departures/{id}
    /assignments and /assignments/{id}, linking a Departure to the vehicle/
    driver/guide staffing it (a departure can have several, one per vehicle).
    Rejects an inactive vehicle/driver, a guideUserId not referencing a
    TOUR_GUIDE in the same org, or a vehicle/driver already assigned to a
    date-overlapping departure (double-booking). /assignments/mine is a
    self-service schedule lookup for TOUR_GUIDE/DRIVER/VEHICLE_OWNER,
    API-only this increment (no staff-dashboard portal yet for those roles).
    DR-017 added Phase 2 Increment 1 (fleet + compliance): /fleet/vehicles and
    /fleet/drivers, plus a generalized document upload (documentsService
    .uploadDocument) reused for vehicle registration/insurance/inspection and
    driver license documents, each with an optional expiresAt for compliance
    tracking. VEHICLE_OWNER/DRIVER only ever see their own records
    (fleet/service.ts). DR-015 added the booking-setup wizard: per-seat
    travelers, a tour lead's passport PDF (first real Vercel Blob usage,
    DR-010), and priced add-on services that now flow into the invoice
    subtotal via bookingService.getBillableTotal. GET
    /bookings/{bookingId}/invoice 409s until the traveler manifest, tour-lead
    passport, and add-ons step are all complete. Document bytes are always
    streamed through this API server-side (Vercel Blob access: 'private') and
    never exposed as a raw URL. Extend this file as new endpoints are added
    (do not let it drift).
servers:
  - url: https://polcotours.com/api/v1
  - url: http://localhost:3000/api/v1
security:
  - sessionCookie: []

paths:
  /catalog/packages:
    get:
      summary: List tour packages
      description: Non-operator roles only ever see PUBLISHED packages.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  packages:
                    type: array
                    items: { $ref: '#/components/schemas/TourPackage' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      summary: Create a tour package
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreatePackageInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  package: { $ref: '#/components/schemas/TourPackage' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationFailed' }

  /catalog/packages/{packageId}:
    parameters:
      - $ref: '#/components/parameters/packageId'
    get:
      summary: Get a tour package
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  package: { $ref: '#/components/schemas/TourPackage' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      summary: Update a tour package
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdatePackageInput' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  package: { $ref: '#/components/schemas/TourPackage' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    delete:
      summary: Soft-delete a tour package (operator only)
      description: >-
        Sets deletedAt (DR-028) -- hides it from every listing, no cascade
        risk to real Departures/Bookings/Invoices (unlike a real DB DELETE).
      responses:
        '204': { description: Deleted }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /catalog/packages/{packageId}/duplicate:
    parameters:
      - $ref: '#/components/parameters/packageId'
    post:
      summary: Duplicate a tour package (operator only)
      description: Clones the package definition only, as a new DRAFT package with a fresh packageReference -- no departures come along (DR-028).
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  package: { $ref: '#/components/schemas/TourPackage' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /catalog/packages/{packageId}/departures:
    parameters:
      - $ref: '#/components/parameters/packageId'
    get:
      summary: List departures for a package
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  departures:
                    type: array
                    items: { $ref: '#/components/schemas/Departure' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      summary: Schedule a departure
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateDepartureInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  departure: { $ref: '#/components/schemas/Departure' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationFailed' }

  /departures/{departureId}:
    parameters:
      - $ref: '#/components/parameters/departureId'
    get:
      summary: Get departure detail with inline availability
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  departure: { $ref: '#/components/schemas/Departure' }
                  packageStatus: { type: string }
                  packageCountry: { type: string }
                  effectiveUnitPrice: { $ref: '#/components/schemas/Money' }
                  bookable: { type: boolean }
                  seatsAvailable: { type: integer }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      summary: Set a departure's pickup location (operator only)
      description: DR-029. The only mutable field on an existing departure -- feeds the assignment recommendation's distance factor.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SetDeparturePickupLocationInput' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  departure: { $ref: '#/components/schemas/Departure' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /departures/{departureId}/recommend-assignment:
    parameters:
      - $ref: '#/components/parameters/departureId'
    get:
      summary: Get a rules-based vehicle/driver recommendation (operator only)
      description: >-
        DR-029. NOT the "AI assignment engine" this project's roadmap lists
        as Phase 3 -- a simple, transparent, equal-weighted scorer. The
        Platform Admin still confirms or overrides via POST .../assignments.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AssignmentRecommendation' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /departures/{departureId}/availability:
    parameters:
      - $ref: '#/components/parameters/departureId'
    get:
      summary: Lightweight pre-submit availability recheck
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Availability' }
        '404': { $ref: '#/components/responses/NotFound' }

  /departures/{departureId}/assignments:
    parameters:
      - $ref: '#/components/parameters/departureId'
    get:
      summary: List a departure's assignments (manager-only, DR-018)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  assignments:
                    type: array
                    items: { $ref: '#/components/schemas/Assignment' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      summary: Assign a vehicle + driver (+ optional guide) to a departure (DR-018)
      description: >-
        A departure can have several assignments, one per vehicle, once its
        capacity exceeds one vehicle's seatCapacity. Rejects an inactive
        vehicle/driver, a guideUserId not referencing a TOUR_GUIDE in this
        org, or a vehicle/driver already assigned to a date-overlapping
        departure (double-booking).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateAssignmentInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  assignment: { $ref: '#/components/schemas/Assignment' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Inactive vehicle/driver, double-booking, or this vehicle is already on this departure
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422': { $ref: '#/components/responses/ValidationFailed' }

  /assignments/{assignmentId}:
    parameters:
      - $ref: '#/components/parameters/assignmentId'
    delete:
      summary: Remove an assignment (manager-only, DR-018)
      responses:
        '204':
          description: No Content
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /assignments/mine:
    get:
      summary: List the caller's own assignments (DR-018)
      description: >-
        TOUR_GUIDE/DRIVER/VEHICLE_OWNER only -- scoped to their own guide/
        driver-profile/vehicle records in assignment/service.ts. API-only
        this increment, no staff-dashboard portal yet for these roles.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  assignments:
                    type: array
                    items: { $ref: '#/components/schemas/Assignment' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /bookings:
    get:
      summary: List bookings
      description: Tourist -> own bookings only. Staff -> the full org manifest.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  bookings:
                    type: array
                    items: { $ref: '#/components/schemas/Booking' }
    post:
      summary: Book a predefined package's departure -- places a seat hold (30-minute expiry)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateBookingInput' }
      responses:
        '201':
          description: Created, status AWAITING_DEPOSIT
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking: { $ref: '#/components/schemas/Booking' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: Departure is sold out or not bookable
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422': { $ref: '#/components/responses/ValidationFailed' }

  /bookings/{bookingId}:
    parameters:
      - $ref: '#/components/parameters/bookingId'
    get:
      summary: Get a booking
      description: A tourist may only fetch their own booking (404 if not theirs, not 403 -- avoids leaking existence).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking: { $ref: '#/components/schemas/Booking' }
        '404': { $ref: '#/components/responses/NotFound' }

  /bookings/{bookingId}/confirm:
    parameters:
      - $ref: '#/components/parameters/bookingId'
    post:
      summary: >-
        Confirm a paid booking (operator only). Requires status DEPOSIT_PAID
        or FULLY_PAID -- payment.resolve's success path moves a booking into
        one of those automatically; Confirm itself stays a separate manual
        staff action (no real DPO webhook yet, OI-01 open).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking: { $ref: '#/components/schemas/Booking' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /bookings/{bookingId}/cancel:
    parameters:
      - $ref: '#/components/parameters/bookingId'
    post:
      summary: Cancel a booking
      description: A tourist may only cancel their own booking; an operator may cancel any booking in their org.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking: { $ref: '#/components/schemas/Booking' }
        '404': { $ref: '#/components/responses/NotFound' }

  /bookings/{bookingId}/refund:
    parameters:
      - $ref: '#/components/parameters/bookingId'
    post:
      summary: Mark a cancelled booking as refunded (operator only)
      description: >-
        Status-only (CANCELLED -> REFUNDED) -- no real payment-reversal
        mechanism exists yet; mirrors payment.resolve's fraud-prevention
        posture (a tourist self-marking their own refund is the same risk).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking: { $ref: '#/components/schemas/Booking' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /bookings/{bookingId}/rating-code:
    parameters:
      - $ref: '#/components/parameters/bookingId'
    post:
      summary: Generate a single-use Rating Code for a fully-paid booking (DR-037)
      description: >-
        Gated on rating.issue, not booking.confirm (creates a row in the
        ratings module's own table, mirroring itinerary.write's precedent).
        Requires the booking's invoice to have reached PAID -- checked via
        Invoice.status, not Booking.status, since a booking can reach
        CONFIRMED/COMPLETED off a deposit-only payment (DR-027). One code
        per booking; 409s if already issued or not yet fully paid.
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  ratingCode: { $ref: '#/components/schemas/RatingCode' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Already issued for this booking, or not yet fully paid
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /bookings/tailor-made:
    post:
      summary: Create a bespoke trip request (no pre-existing Departure)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateTailorMadeInput' }
      responses:
        '201':
          description: Created, status AWAITING_QUOTATION
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking: { $ref: '#/components/schemas/Booking' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationFailed' }

  /bookings/{bookingId}/quotation:
    parameters:
      - $ref: '#/components/parameters/bookingId'
    post:
      summary: Price a booking currently AWAITING_QUOTATION (operator only)
      description: Applies to a TAILOR_MADE request or a PREDEFINED_PACKAGE booking that asked for a quote instead of paying immediately.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SendQuotationInput' }
      responses:
        '200':
          description: OK, status QUOTATION_SENT
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking: { $ref: '#/components/schemas/Booking' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /bookings/{bookingId}/quotation/accept:
    parameters:
      - $ref: '#/components/parameters/bookingId'
    post:
      summary: Accept a sent quotation and proceed toward payment
      description: QUOTATION_SENT -> AWAITING_DEPOSIT. A tourist may only accept their own booking's quotation.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking: { $ref: '#/components/schemas/Booking' }
        '404': { $ref: '#/components/responses/NotFound' }

  /bookings/{bookingId}/convert-to-itinerary:
    parameters:
      - $ref: '#/components/parameters/bookingId'
    post:
      summary: Convert an approved TAILOR_MADE booking into an operational itinerary (operator only)
      description: >-
        DR-028. Requires origin TAILOR_MADE, a set price (quotation sent --
        that IS the approval gate, not payment), and no existing departureId.
        Creates a bespoke Departure and attaches it, after which the existing
        Assignment endpoints (POST /departures/{id}/assignments) work
        completely unchanged.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  booking: { $ref: '#/components/schemas/Booking' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: Not a TAILOR_MADE booking, not yet priced, or already converted
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /bookings/{bookingId}/invoice:
    parameters:
      - $ref: '#/components/parameters/bookingId'
    get:
      summary: Get (or lazily create) the invoice for a booking
      description: >-
        Idempotent get-or-create -- an invoice is created on first access, not
        at hold time. Snapshots per-country tax (DR-006) and the 40/60
        deposit/balance split (DR-012). Subtotal is the booking's seat price
        plus any finalized add-ons (DR-015, bookingService.getBillableTotal).
        Ownership is inherited from the booking's own anti-BOLA check.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  invoice: { $ref: '#/components/schemas/Invoice' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: >-
            No effective tax rate configured for this country, OR the
            traveler manifest / tour-lead passport / add-ons wizard steps
            (DR-015) are not all complete yet.
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /bookings/{bookingId}/travelers:
    parameters:
      - $ref: '#/components/parameters/bookingId'
    get:
      summary: List a booking's travelers
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  travelers:
                    type: array
                    items: { $ref: '#/components/schemas/Traveler' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      summary: Add a traveler to the booking (DR-015)
      description: >-
        One Traveler per seat, no more (409 once seats are filled). Exactly
        one may be isTourLead=true per booking; only that traveler needs a
        passport upload.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AddTravelerInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  traveler: { $ref: '#/components/schemas/Traveler' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: All seats already have a traveler, or a tour lead is already set
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422': { $ref: '#/components/responses/ValidationFailed' }

  /bookings/{bookingId}/travelers/{travelerId}/passport:
    parameters:
      - $ref: '#/components/parameters/bookingId'
      - $ref: '#/components/parameters/travelerId'
    get:
      summary: Download the tour lead's passport (DR-015)
      description: >-
        Streams the PDF bytes server-side from Vercel Blob (access: 'private')
        -- there is no public URL for this document. Every access is audited
        (Documents rule, CLAUDE.md).
      responses:
        '200':
          description: OK
          content:
            application/pdf:
              schema: { type: string, format: binary }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      summary: Upload the tour lead's passport (DR-015)
      description: Only the traveler flagged isTourLead may have a passport attached.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [passport]
              properties:
                passport: { type: string, format: binary, description: 'PDF, up to 10MB' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  document: { $ref: '#/components/schemas/DocumentSummary' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: This traveler is not the tour lead
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422': { $ref: '#/components/responses/ValidationFailed' }

  /bookings/{bookingId}/travelers/{travelerId}/visa:
    parameters:
      - $ref: '#/components/parameters/bookingId'
      - $ref: '#/components/parameters/travelerId'
    get:
      summary: View a traveler's visa application (DR-019)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  application: { $ref: '#/components/schemas/VisaApplication' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /bookings/{bookingId}/travelers/{travelerId}/visa/submit:
    parameters:
      - $ref: '#/components/parameters/bookingId'
      - $ref: '#/components/parameters/travelerId'
    post:
      summary: Submit a visa application for a traveler (VISA_FACILITATOR, DR-019)
      description: >-
        Snapshots the traveler's identity and the departure's destination
        country onto the application -- one per traveler; once decided, a
        REJECTED application can be reset back to SUBMITTED via
        /visa/resubmit (DR-025), an APPROVED one cannot.
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  application: { $ref: '#/components/schemas/VisaApplication' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: A visa application already exists for this traveler
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /bookings/{bookingId}/travelers/{travelerId}/visa/decide:
    parameters:
      - $ref: '#/components/parameters/bookingId'
      - $ref: '#/components/parameters/travelerId'
    post:
      summary: Approve or reject a SUBMITTED visa application (VISA_FACILITATOR, DR-019)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DecideVisaInput' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  application: { $ref: '#/components/schemas/VisaApplication' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: The application is not SUBMITTED
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422': { $ref: '#/components/responses/ValidationFailed' }

  /bookings/{bookingId}/travelers/{travelerId}/visa/resubmit:
    parameters:
      - $ref: '#/components/parameters/bookingId'
      - $ref: '#/components/parameters/travelerId'
    post:
      summary: Resubmit a REJECTED visa application (VISA_FACILITATOR, DR-025)
      description: >-
        Resets the same application back to SUBMITTED (status, decidedAt,
        rejectionReason, documentId all cleared; submittedAt bumped so it
        resurfaces for review; resubmissionCount incremented). The prior
        rejection is preserved permanently in the audit log
        (visa.resubmitted), not on the row itself.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  application: { $ref: '#/components/schemas/VisaApplication' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: The application is not REJECTED
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /bookings/{bookingId}/travelers/{travelerId}/visa/document:
    parameters:
      - $ref: '#/components/parameters/bookingId'
      - $ref: '#/components/parameters/travelerId'
    get:
      summary: Download the granted visa document (DR-019)
      description: >-
        Streams the bytes server-side from Vercel Blob (access: 'private') --
        there is no public URL for this document. Every access is audited.
      responses:
        '200':
          description: OK
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      summary: Upload the granted visa document (VISA_FACILITATOR, DR-019)
      description: PDF or a phone photo (JPEG/PNG) up to 10MB.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file: { type: string, format: binary }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  document: { $ref: '#/components/schemas/DocumentSummary' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationFailed' }

  /bookings/{bookingId}/travelers/{travelerId}/visa/contact:
    parameters:
      - $ref: '#/components/parameters/bookingId'
      - $ref: '#/components/parameters/travelerId'
    post:
      summary: Send a staff-authored message about a traveler's visa application (DR-034)
      description: >-
        Real notification-triggering action (WhatsApp -> SMS -> email
        fallback) -- a Traveler isn't itself a User account, so this
        notifies the booking's tour lead (touristUserId), resolved via
        bookingService.getBookingForTraveler.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ContactTravelerInput' }
      responses:
        '204': { description: No Content }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationFailed' }

  /bookings/{bookingId}/travelers/{travelerId}/visa/request-documents:
    parameters:
      - $ref: '#/components/parameters/bookingId'
      - $ref: '#/components/parameters/travelerId'
    post:
      summary: Notify the tour lead that a visa document is missing (DR-034)
      description: Same recipient-resolution and fallback-chain shape as .../visa/contact.
      responses:
        '204': { description: No Content }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /visa/queue:
    get:
      summary: VISA_FACILITATOR's own whole-org visa queue (My Schedule, DR-031)
      description: >-
        No country scoping (unlike /immigration/visa-applications) -- this
        role has no per-facilitator assignment concept, so it sees every
        application in the org. Sorted by resolved travelStartDate ascending
        (nulls last).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  applications:
                    type: array
                    items: { $ref: '#/components/schemas/FacilitatorVisaView' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /users:
    get:
      summary: List every non-deleted user in the org, with their held roles (admin-only, DR-026)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items: { $ref: '#/components/schemas/User' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      summary: Create a staff account with one or more roles (admin-only, DR-026)
      description: >-
        Generates a one-time password, returned exactly once in this
        response and never persisted in plaintext or retrievable again. The
        account is forced to change it at first sign-in
        (mustChangePassword).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateUserInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: '#/components/schemas/User' }
                  temporaryPassword: { type: string }
        '403': { $ref: '#/components/responses/Forbidden' }
        '409':
          description: A user with this email already exists
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422': { $ref: '#/components/responses/ValidationFailed' }

  /users/{userId}:
    parameters:
      - $ref: '#/components/parameters/userId'
    patch:
      summary: Edit a user's name/email/phone/roles (admin-only, DR-035)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateUserInput' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: '#/components/schemas/User' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: A user with this email already exists
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422': { $ref: '#/components/responses/ValidationFailed' }
    delete:
      summary: Deactivate (soft-delete) a user (admin-only, DR-026)
      description: >-
        Sets deletedAt; the next request the deactivated user makes fails
        closed (authService.resolveSession already treats a deletedAt-set
        user as unauthenticated). Blocks deactivating your own account.
      responses:
        '204': { description: No Content }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: You cannot deactivate your own account
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }

  /users/{userId}/reset-password:
    parameters:
      - $ref: '#/components/parameters/userId'
    post:
      summary: Generate a new one-time password for a user (admin-only, DR-035)
      description: >-
        Same reveal-once contract as POST /users' temporaryPassword -- never
        persisted in plaintext or retrievable again. Forces
        mustChangePassword on the target account.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  temporaryPassword: { type: string }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /permissions:
    get:
      summary: Get the full role-permission matrix (admin-only, DR-035)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  matrix:
                    type: object
                    description: Editable role name -> array of granted permissions
                    additionalProperties:
                      type: array
                      items: { type: string }
        '403': { $ref: '#/components/responses/Forbidden' }
    patch:
      summary: Grant or revoke a single role+permission pair (SUPERADMIN-only, DR-035)
      description: >-
        The route itself only requires admin.all (so PLATFORM_ADMIN reaches
        the handler); authService.setRolePermission additionally rejects
        any non-SUPERADMIN caller, and PLATFORM_ADMIN can never appear as
        the `role` in the request body either -- SUPERADMIN itself has no
        RolePermission rows and is never editable.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SetRolePermissionInput' }
      responses:
        '204': { description: No Content }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationFailed' }

  /bookings/{bookingId}/addons:
    parameters:
      - $ref: '#/components/parameters/bookingId'
    post:
      summary: Finalize the booking's add-on selection (DR-015)
      description: >-
        Replace-all semantics -- meant to be called once, including with an
        empty list (choosing none). Snapshots each AddonService's price/
        currency onto the Booking and stamps addonsFinalizedAt, which gates
        invoice creation (GET /bookings/{bookingId}/invoice).
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SetAddonsInput' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  addons:
                    type: array
                    items: { $ref: '#/components/schemas/BookingAddon' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: An add-on's currency does not match the booking's currency
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422': { $ref: '#/components/responses/ValidationFailed' }

  /invoices/{invoiceId}/payments:
    parameters:
      - $ref: '#/components/parameters/invoiceId'
    get:
      summary: List payment attempts for an invoice
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  payments:
                    type: array
                    items: { $ref: '#/components/schemas/Payment' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      summary: Initiate a deposit or balance payment (stubbed DPO gateway)
      description: >-
        DPO's real commercial terms are still pending (OI-01) -- this returns
        a fake redirect URL and a PENDING payment; a staff-only
        /payments/{paymentId}/resolve action stands in for DPO's future
        webhook. The balance leg cannot be initiated until the deposit has
        succeeded.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/InitiatePaymentInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment: { $ref: '#/components/schemas/Payment' }
                  redirectUrl: { type: string, format: uri }
        '404': { $ref: '#/components/responses/NotFound' }
        '409':
          description: This payment leg cannot be initiated in the invoice's current state
          content:
            application/problem+json:
              schema: { $ref: '#/components/schemas/Problem' }
        '422': { $ref: '#/components/responses/ValidationFailed' }

  /payments/{paymentId}/resolve:
    parameters:
      - $ref: '#/components/parameters/paymentId'
    post:
      summary: Resolve a pending payment (staff only -- stands in for a future DPO webhook)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ResolvePaymentInput' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  payment: { $ref: '#/components/schemas/Payment' }
                  invoice: { $ref: '#/components/schemas/Invoice' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /fleet/vehicles:
    get:
      summary: List vehicles
      description: >-
        TOUR_OPERATOR/SUPERADMIN see the whole org fleet. VEHICLE_OWNER sees
        only vehicles where ownerId matches them (DR-017).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  vehicles:
                    type: array
                    items: { $ref: '#/components/schemas/Vehicle' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      summary: Register a vehicle (fleet.write, staff only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateVehicleInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  vehicle: { $ref: '#/components/schemas/Vehicle' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationFailed' }

  /fleet/vehicles/{vehicleId}:
    parameters:
      - $ref: '#/components/parameters/vehicleId'
    get:
      summary: Get a vehicle
      description: A VEHICLE_OWNER may only fetch a vehicle they own (404 if not theirs, not 403 -- avoids leaking existence).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  vehicle: { $ref: '#/components/schemas/Vehicle' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      summary: Update a vehicle (fleet.write, staff only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateVehicleInput' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  vehicle: { $ref: '#/components/schemas/Vehicle' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /fleet/vehicles/{vehicleId}/documents:
    parameters:
      - $ref: '#/components/parameters/vehicleId'
    get:
      summary: List a vehicle's compliance documents (DR-017)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  documents:
                    type: array
                    items: { $ref: '#/components/schemas/DocumentSummary' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      summary: Upload a vehicle compliance document (fleet.write, staff only)
      description: >-
        kind is one of VEHICLE_REGISTRATION / VEHICLE_INSURANCE /
        VEHICLE_INSPECTION. PDF or a phone photo (JPEG/PNG) up to 10MB.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, kind]
              properties:
                file: { type: string, format: binary }
                kind: { type: string, enum: [VEHICLE_REGISTRATION, VEHICLE_INSURANCE, VEHICLE_INSPECTION] }
                expiresAt: { type: string, format: date-time }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  document: { $ref: '#/components/schemas/DocumentSummary' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationFailed' }

  /fleet/vehicles/{vehicleId}/documents/{documentId}:
    parameters:
      - $ref: '#/components/parameters/vehicleId'
      - $ref: '#/components/parameters/documentId'
    get:
      summary: Download a vehicle compliance document (DR-017)
      description: >-
        Streams the bytes server-side from Vercel Blob (access: 'private') --
        there is no public URL for this document. Every access is audited.
      responses:
        '200':
          description: OK
          content:
            application/octet-stream:
              schema: { type: string, format: binary }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /fleet/vehicles/{vehicleId}/maintenance:
    parameters:
      - $ref: '#/components/parameters/vehicleId'
    get:
      summary: List a vehicle's maintenance history (DR-029)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  records:
                    type: array
                    items: { $ref: '#/components/schemas/MaintenanceRecord' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      summary: Log a maintenance event (operator only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateMaintenanceRecordInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  record: { $ref: '#/components/schemas/MaintenanceRecord' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /fleet/drivers:
    get:
      summary: List driver profiles (staff only -- DR-017)
      description: A DRIVER looks up their own profile via GET /fleet/drivers/{driverProfileId} instead.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  drivers:
                    type: array
                    items: { $ref: '#/components/schemas/DriverProfile' }
        '403': { $ref: '#/components/responses/Forbidden' }
    post:
      summary: Create a driver profile (fleet.write, staff only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateDriverProfileInput' }
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  driver: { $ref: '#/components/schemas/DriverProfile' }
        '403': { $ref: '#/components/responses/Forbidden' }
        '422': { $ref: '#/components/responses/ValidationFailed' }

  /fleet/drivers/{driverProfileId}:
    parameters:
      - $ref: '#/components/parameters/driverProfileId'
    get:
      summary: Get a driver profile
      description: A DRIVER may only fetch their own profile (404 if not theirs, not 403 -- avoids leaking existence).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  driver: { $ref: '#/components/schemas/DriverProfile' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      summary: Update a driver profile (fleet.write, staff only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateDriverProfileInput' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
