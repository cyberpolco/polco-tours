        '409': { description: A regulation already exists for this country }
        '422': { $ref: '#/components/responses/ValidationFailed' }

  /country-regulations/{country}:
    parameters:
      - name: country
        in: path
        required: true
        schema: { type: string, minLength: 2, maxLength: 2 }
        description: ISO-3166 alpha-2 -- a natural key, not a synthetic id
    get:
      summary: Get a country's immigration regulations (country_regulation.read)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object, properties: { regulation: { $ref: '#/components/schemas/CountryRegulation' } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
    patch:
      summary: Update a country's regulations (country_regulation.write, SUPERADMIN-only)
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateCountryRegulationInput' }
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { type: object, properties: { regulation: { $ref: '#/components/schemas/CountryRegulation' } } }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }
        '422': { $ref: '#/components/responses/ValidationFailed' }
    delete:
      summary: Delete a country's regulations (country_regulation.write, SUPERADMIN-only)
      description: Hard delete -- global config, no soft-delete concept; history lives in audit_logs.
      responses:
        '204': { description: No Content }
        '403': { $ref: '#/components/responses/Forbidden' }
        '404': { $ref: '#/components/responses/NotFound' }

  /ratings:
    get:
      summary: Staff moderation/insights view of every review (rating.read)
      description: >-
        Whole-org, no caller-supplied id -- same safe shape as /visa/queue.
        Returns individual reviews (with comments) plus an aggregate
        summary (org-wide + per-driver + per-guide averageRating/
        ratingCount).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  reviews:
                    type: array
                    items: { $ref: '#/components/schemas/Review' }
                  summary:
                    type: object
                    description: '{ organization, drivers, guides } -- each an averageRating/ratingCount aggregate'
        '403': { $ref: '#/components/responses/Forbidden' }

  /insights:
    get:
      summary: Read-only executive dashboard (insights.read)
      description: >-
        Whole-org, no caller-supplied id -- same safe shape as /visa/queue
        and /ratings. Composed entirely from existing booking/invoicing/
        assignment/fleet/ratings/visa data; no new tables. Deliberately not
        a real BI/analytics engine -- utilization figures are a simple
        ratio, revenue is reported per currency (USD/EUR/NAD/CDF) and never
        summed across currencies (no FX conversion anywhere in this app).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  summary: { $ref: '#/components/schemas/DashboardSummary' }
        '403': { $ref: '#/components/responses/Forbidden' }

components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: polco.session_token
      description: Better Auth session cookie (advanced.cookiePrefix = "polco").

  parameters:
    packageId:
      name: packageId
      in: path
      required: true
      schema: { type: string, format: uuid }
    departureId:
      name: departureId
      in: path
      required: true
      schema: { type: string, format: uuid }
    bookingId:
      name: bookingId
      in: path
      required: true
      schema: { type: string, format: uuid }
    travelerId:
      name: travelerId
      in: path
      required: true
      schema: { type: string, format: uuid }
    invoiceId:
      name: invoiceId
      in: path
      required: true
      schema: { type: string, format: uuid }
    paymentId:
      name: paymentId
      in: path
      required: true
      schema: { type: string, format: uuid }
    vehicleId:
      name: vehicleId
      in: path
      required: true
      schema: { type: string, format: uuid }
    driverProfileId:
      name: driverProfileId
      in: path
      required: true
      schema: { type: string, format: uuid }
    guideProfileId:
      name: guideProfileId
      in: path
      required: true
      schema: { type: string, format: uuid }
    documentId:
      name: documentId
      in: path
      required: true
      schema: { type: string, format: uuid }
    itineraryId:
      name: itineraryId
      in: path
      required: true
      schema: { type: string, format: uuid }
    hotelId:
      name: hotelId
      in: path
      required: true
      schema: { type: string, format: uuid }
    restaurantId:
      name: restaurantId
      in: path
      required: true
      schema: { type: string, format: uuid }
    assignmentId:
      name: assignmentId
      in: path
      required: true
      schema: { type: string, format: uuid }
    userId:
      name: userId
      in: path
      required: true
      schema: { type: string, format: uuid }

  responses:
    Forbidden:
      description: Caller lacks the required permission, or is not authenticated
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    NotFound:
      description: Resource not found (or hidden -- see anti-BOLA notes above)
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }
    ValidationFailed:
      description: Request body failed schema validation
      content:
        application/problem+json:
          schema: { $ref: '#/components/schemas/Problem' }

  schemas:
    Problem:
      description: RFC 9457 problem+json (src/lib/errors.ts). Never contains stack traces or internals.
      type: object
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
        traceId: { type: string }

    Money:
      type: object
      properties:
        minor: { type: integer, description: 'Integer minor units, e.g. 1050 = 10.50 (BR-02, never a float)' }
        currency: { type: string, enum: [USD, EUR, NAD, CDF] }

    TourPackage:
      type: object
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        packageReference: { type: string, description: 'Business-facing reference, e.g. PKG-00034 (DR-028)' }
        title: { type: string }
        description: { type: string }
        country: { type: string, description: ISO-3166 alpha-2 }
        priceMinor: { type: integer }
        currency: { type: string, enum: [USD, EUR, NAD, CDF] }
        durationDays: { type: integer, nullable: true }
        status: { type: string, enum: [DRAFT, PUBLISHED, ARCHIVED] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreatePackageInput:
      type: object
      required: [title, description, country, priceMinor, currency]
      properties:
        title: { type: string, minLength: 1, maxLength: 200 }
        description: { type: string, minLength: 1 }
        country: { type: string, minLength: 2, maxLength: 2 }
        priceMinor: { type: integer, minimum: 0 }
        currency: { type: string, enum: [USD, EUR, NAD, CDF] }
        durationDays: { type: integer, minimum: 1 }

    UpdatePackageInput:
      allOf:
        - $ref: '#/components/schemas/CreatePackageInput'
        - type: object
          properties:
            status: { type: string, enum: [DRAFT, PUBLISHED, ARCHIVED] }
      description: All fields optional (partial update).

    Departure:
      type: object
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        tourPackageId:
          type: string
          format: uuid
          nullable: true
          description: Null only for a bespoke departure converted from a TAILOR_MADE booking (DR-028, no TourPackage).
        startDate: { type: string, format: date-time }
        endDate: { type: string, format: date-time, nullable: true }
        capacity: { type: integer }
        priceOverrideMinor:
          type: integer
          nullable: true
          description: For a bespoke departure (no package), this IS the price -- not an override of anything.
        currency: { type: string, enum: [USD, EUR, NAD, CDF], nullable: true, description: Bespoke departures only. }
        customCountry: { type: string, nullable: true, description: 'Bespoke departures only -- ISO-3166 alpha-2 (DR-028).' }
        pickupLatitude: { type: number, nullable: true, description: 'Staff-entered (DR-029); feeds the assignment recommendation''s distance factor.' }
        pickupLongitude: { type: number, nullable: true }
        status: { type: string, enum: [SCHEDULED, CANCELLED, COMPLETED] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateDepartureInput:
      type: object
      required: [startDate, capacity]
      properties:
        startDate: { type: string, format: date-time }
        endDate: { type: string, format: date-time }
        capacity: { type: integer, minimum: 1 }
        priceOverrideMinor: { type: integer, minimum: 0 }

    Availability:
      type: object
      properties:
        capacity: { type: integer }
        seatsAvailable: { type: integer }

    Booking:
      type: object
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        origin: { type: string, enum: [PREDEFINED_PACKAGE, TAILOR_MADE] }
        departureId:
          type: string
          format: uuid
          nullable: true
          description: Null only for a TAILOR_MADE booking (no fixed departure).
        touristUserId: { type: string, format: uuid }
        seats: { type: integer }
        status:
          type: string
          enum:
            [
              DRAFT,
              AWAITING_QUOTATION,
              QUOTATION_SENT,
              AWAITING_DEPOSIT,
              DEPOSIT_PAID,
              FULLY_PAID,
              CONFIRMED,
              IN_PROGRESS,
              COMPLETED,
              CANCELLED,
              REFUNDED,
            ]
          description: >-
            AWAITING_DEPOSIT is the seat hold (was HELD); an expired hold
            lazily sweeps to CANCELLED (no dedicated EXPIRED value).
        holdExpiresAt:
          type: string
          format: date-time
          nullable: true
          description: Set only while status = AWAITING_DEPOSIT, and only for a PREDEFINED_PACKAGE booking.
        priceMinor:
          type: integer
          nullable: true
          description: Null for a TAILOR_MADE booking until staff sends a quotation.
        currency: { type: string, enum: [USD, EUR, NAD, CDF], nullable: true }
        addonsFinalizedAt:
          type: string
          format: date-time
          nullable: true
          description: Set once the add-ons wizard step is submitted (DR-015), even choosing none. Gates invoicing.
        bookingReference:
          type: string
          description: 'Business-facing reference, e.g. H0I4O8 (6-char pattern, DR-045). Also the sole "find my booking" lookup key (+ tour lead last name, DR-052) -- the separate confirmationCode secret this used to coexist with was removed.'
        specialRequests: { type: string, nullable: true, maxLength: 1000 }
        customCountry:
          type: string
          nullable: true
          description: TAILOR_MADE only -- ISO-3166 alpha-2, drives tax-rate lookup in lieu of a Departure's package.
        customTravelStart: { type: string, format: date-time, nullable: true, description: TAILOR_MADE only. }
        customTravelEnd: { type: string, format: date-time, nullable: true, description: TAILOR_MADE only. }
        customDescription: { type: string, nullable: true, maxLength: 2000, description: TAILOR_MADE only. }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    RatingCode:
      description: Customer Ratings & Feedback (DR-037) -- one per Booking, single-use, expiring.
      type: object
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        bookingId: { type: string, format: uuid }
        code: { type: string, description: '8-char random code, paired with bookingReference for the guest rating lookup.' }
        issuedByUserId: { type: string, format: uuid }
        issuedAt: { type: string, format: date-time }
        expiresAt: { type: string, format: date-time }
        usedAt: { type: string, format: date-time, nullable: true, description: 'Null = unused. Set the moment a Review is created for it.' }

    Review:
      description: Customer Ratings & Feedback (DR-037) -- one per Booking.
      type: object
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        bookingId: { type: string, format: uuid }
        ratingCodeId: { type: string, format: uuid }
        touristUserId: { type: string, format: uuid }
        overallRating: { type: integer, minimum: 1, maximum: 5 }
        overallComment: { type: string, nullable: true, maxLength: 1000 }
        createdAt: { type: string, format: date-time }
        subjectRatings:
          type: array
          items:
            type: object
            properties:
              id: { type: string, format: uuid }
              subjectType: { type: string, enum: [DRIVER, GUIDE] }
              driverProfileId: { type: string, format: uuid, nullable: true }
              guideUserId: { type: string, format: uuid, nullable: true }
              rating: { type: integer, minimum: 1, maximum: 5 }
              comment: { type: string, nullable: true, maxLength: 1000 }

    MoneyByCurrency:
      description: 'One bucket per currency (minor units) -- never summed across currencies.'
      type: object
      additionalProperties: { type: integer }
      example: { USD: 150000, EUR: 20000 }

    DashboardSummary:
      description: Insights & Decision Making (DR-038) executive dashboard.
      type: object
      properties:
        bookings:
          type: object
          properties:
            totalBookings: { type: integer }
            activeTours: { type: integer, description: Bookings currently IN_PROGRESS. }
            pendingQuotations: { type: integer, description: AWAITING_QUOTATION + QUOTATION_SENT. }
            conversionRate: { type: number, minimum: 0, maximum: 1 }
        revenue:
          type: object
          properties:
            revenue: { $ref: '#/components/schemas/MoneyByCurrency' }
            revenueByCountry:
              type: object
              additionalProperties: { $ref: '#/components/schemas/MoneyByCurrency' }
            revenueByPackage:
              type: object
              additionalProperties: { $ref: '#/components/schemas/MoneyByCurrency' }
            outstanding: { $ref: '#/components/schemas/MoneyByCurrency' }
        operations:
          type: object
          properties:
            fleetUtilization: { type: number, minimum: 0, maximum: 1 }
            driverUtilization: { type: number, minimum: 0, maximum: 1 }
            guideUtilization: { type: number, minimum: 0, maximum: 1 }
            mostBookedDestinations:
              type: array
              items:
                type: object
                properties:
                  country: { type: string }
                  count: { type: integer }
        customerExperience:
          type: object
          properties:
            averageRating: { type: number, nullable: true, minimum: 1, maximum: 5 }
            ratingCount: { type: integer }
            repeatCustomers: { type: integer }
            topGuides:
              type: array
              items: { $ref: '#/components/schemas/TopPerformer' }
            topDrivers:
              type: array
              items: { $ref: '#/components/schemas/TopPerformer' }
        immigration:
          type: object
          properties:
            pendingVisas: { type: integer }
            approvedVisas: { type: integer }
            rejectedVisas: { type: integer }
            missingDocuments: { type: integer }

    TopPerformer:
      type: object
      properties:
        name: { type: string }
        averageRating: { type: number, minimum: 1, maximum: 5 }
        ratingCount: { type: integer }

    Traveler:
      type: object
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        bookingId: { type: string, format: uuid }
        firstName: { type: string }
        lastName: { type: string }
        age: { type: integer }
        sex: { type: string, enum: [M, F, X], description: ICAO 9303 passport MRZ convention }
        nationality: { type: string, description: ISO-3166 alpha-2 }
        idOrPassportNumber: { type: string }
        phone: { type: string, nullable: true, description: E.164 }
        disabilities: { type: string, nullable: true }
        allergies: { type: string, nullable: true }
        drinkPreference: { type: string, nullable: true }
        emergencyContactName: { type: string, nullable: true, description: Guides Module, DR-030 }
        emergencyContactPhone: { type: string, nullable: true, description: 'Reference info, not E.164-validated (DR-030)' }
        emergencyContactRelation: { type: string, nullable: true, description: Guides Module, DR-030 }
        isTourLead: { type: boolean, description: Exactly one per booking; only this traveler needs a passport }
        passportDocumentId: { type: string, format: uuid, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    AddTravelerInput:
      type: object
      required: [firstName, lastName, age, sex, nationality, idOrPassportNumber]
      properties:
        firstName: { type: string, minLength: 1, maxLength: 100 }
        lastName: { type: string, minLength: 1, maxLength: 100 }
        age: { type: integer, minimum: 0, maximum: 120 }
        sex: { type: string, enum: [M, F, X] }
        nationality: { type: string, minLength: 2, maxLength: 2 }
        idOrPassportNumber: { type: string, minLength: 1, maxLength: 50 }
        phone: { type: string, description: E.164 }
        disabilities: { type: string, maxLength: 500 }
        allergies: { type: string, maxLength: 500 }
        drinkPreference: { type: string, maxLength: 200 }
        emergencyContactName: { type: string, maxLength: 200 }
        emergencyContactPhone: { type: string, maxLength: 50 }
        emergencyContactRelation: { type: string, maxLength: 100 }
        isTourLead: { type: boolean, default: false }

    TravelerDutyView:
      type: object
      description: >-
        Data-minimized projection for a guide's "client list" (Guides Module,
        DR-030) -- excludes idOrPassportNumber and passportDocumentId. Not
        exposed via a public /api/v1 route; internal to bookingService, called
        only by the /staff/schedule page for the caller's own assigned
        departures.
      properties:
        id: { type: string, format: uuid }
        firstName: { type: string }
        lastName: { type: string }
        age: { type: integer }
        sex: { type: string, enum: [M, F, X] }
        nationality: { type: string }
        phone: { type: string, nullable: true }
        disabilities: { type: string, nullable: true }
        allergies: { type: string, nullable: true }
        drinkPreference: { type: string, nullable: true }
        emergencyContactName: { type: string, nullable: true }
        emergencyContactPhone: { type: string, nullable: true }
        emergencyContactRelation: { type: string, nullable: true }
        isTourLead: { type: boolean }

    DocumentSummary:
      type: object
      description: Never includes the underlying Vercel Blob pathname (Documents rule, CLAUDE.md).
      properties:
        id: { type: string, format: uuid }
        kind:
          type: string
          description: >-
            PASSPORT | VEHICLE_REGISTRATION | VEHICLE_INSURANCE |
            VEHICLE_INSPECTION | DRIVER_LICENSE (DR-017) | VISA (DR-019) |
            GUIDE_CERTIFICATION (DR-030)
        contentType: { type: string }
        sizeBytes: { type: integer }
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: Compliance documents only (DR-017); null for PASSPORT.
        createdAt: { type: string, format: date-time }

    BookingAddon:
      type: object
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        bookingId: { type: string, format: uuid }
        addonServiceId: { type: string, format: uuid }
        priceMinor: { type: integer, description: Snapshotted from AddonService at selection time }
        currency: { type: string, enum: [USD, EUR, NAD, CDF] }
        createdAt: { type: string, format: date-time }

    SetAddonsInput:
      type: object
      required: [addonServiceIds]
      description: Replace-all -- an empty array is valid (choosing no add-ons).
      properties:
        addonServiceIds:
          type: array
          items: { type: string, format: uuid }

    CreateBookingInput:
      type: object
      required: [departureId, seats]
      properties:
        departureId: { type: string, format: uuid }
        seats: { type: integer, minimum: 1 }
        touristUserId:
          type: string
          format: uuid
          description: Staff-only -- lets an operator book on a tourist's behalf (phone/walk-in). Ignored for a tourist caller.
        specialRequests: { type: string, maxLength: 1000 }

    CreateTailorMadeInput:
      type: object
      required: [customCountry, customTravelStart, customTravelEnd, seats, customDescription]
      description: A bespoke trip request with no pre-existing Departure -- staff price it via POST /bookings/{bookingId}/quotation.
      properties:
        customCountry: { type: string, minLength: 2, maxLength: 2, description: ISO-3166 alpha-2 }
        customTravelStart: { type: string, format: date-time }
        customTravelEnd: { type: string, format: date-time }
        seats: { type: integer, minimum: 1 }
        customDescription: { type: string, minLength: 1, maxLength: 2000 }
        touristUserId:
          type: string
          format: uuid
          description: Staff-only -- lets an operator submit this on a tourist's behalf. Ignored for a tourist caller.
        specialRequests: { type: string, maxLength: 1000 }

    SendQuotationInput:
      type: object
      required: [priceMinor, currency]
      properties:
        priceMinor: { type: integer, minimum: 1 }
        currency: { type: string, enum: [USD, EUR, NAD, CDF] }

    Invoice:
      type: object
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        bookingId: { type: string, format: uuid }
        currency: { type: string, enum: [USD, EUR, NAD, CDF] }
        subtotalMinor: { type: integer }
        taxRateBp: { type: integer, description: Snapshotted at invoice-issue time (DR-006) }
        taxMinor: { type: integer }
        totalMinor: { type: integer }
        depositMinor: { type: integer, description: 40% of totalMinor, half-up (DR-012) }
        balanceMinor: { type: integer, description: totalMinor - depositMinor }
        platformFeeMinor: { type: integer, nullable: true, description: 'Informational split of totalMinor (DR-042) -- never added to what the customer owes. Null for invoices predating this feature.' }
        platformFeeRateBp: { type: integer, nullable: true, description: Snapshotted PlatformRate.rateBp at invoice-issue time (DR-042) }
        status: { type: string, enum: [DRAFT, ISSUED, PARTIALLY_PAID, PAID, VOID] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    Payment:
      type: object
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        invoiceId: { type: string, format: uuid }
        kind: { type: string, enum: [DEPOSIT, BALANCE] }
        amountMinor: { type: integer }
        currency: { type: string, enum: [USD, EUR, NAD, CDF] }
        provider: { type: string, description: 'Always "DPO" this increment -- gateway is stubbed (OI-01)' }
        providerRef: { type: string, nullable: true }
        status: { type: string, enum: [PENDING, SUCCEEDED, FAILED] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    InitiatePaymentInput:
      type: object
      required: [kind]
      properties:
        kind: { type: string, enum: [DEPOSIT, BALANCE] }

    ResolvePaymentInput:
      type: object
      required: [outcome]
      properties:
        outcome: { type: string, enum: [SUCCEEDED, FAILED] }

    User:
      type: object
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        name: { type: string, nullable: true }
        role: { type: string, description: 'Primary role (DR-026) -- see roles for the full held set' }
        roles: { type: array, items: { type: string }, description: 'DR-026: every role this user holds simultaneously (Membership rows + primary role, deduped)' }
        organizationId: { type: string, format: uuid, nullable: true }
        emailVerified: { type: boolean }
        phone: { type: string, nullable: true, description: E.164 }
        preferredLocale: { type: string, enum: [EN, FR] }
        deletedAt: { type: string, format: date-time, nullable: true, description: 'DR-026: null = active, set = deactivated' }
        mustChangePassword: { type: boolean, description: 'DR-026: forces a password change at first sign-in' }

    UpdateProfileInput:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 200, description: 'Added for the guest-checkout contact-info step (DR-016)' }
        phone: { type: string, nullable: true, description: E.164 }
        preferredLocale: { type: string, enum: [EN, FR] }

    CreateUserInput:
      type: object
      required: [name, email, roles]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        email: { type: string, format: email }
        phone: { type: string, nullable: true, description: E.164 }
        roles:
          type: array
          minItems: 1
          items:
            type: string
            enum: [SUPERADMIN, PLATFORM_ADMIN, TOUR_OPERATOR, TOUR_GUIDE, DRIVER, VEHICLE_OWNER, VISA_FACILITATOR]
          description: TOURIST is deliberately not assignable -- tourists only ever come from guest checkout (DR-016)

    UpdateUserInput:
      type: object
      description: All fields optional; roles, when given, REPLACES the user's full held role set (DR-035)
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        email: { type: string, format: email }
        phone: { type: string, nullable: true, description: E.164 }
        roles:
          type: array
          minItems: 1
          items:
            type: string
            enum: [SUPERADMIN, PLATFORM_ADMIN, TOUR_OPERATOR, TOUR_GUIDE, DRIVER, VEHICLE_OWNER, VISA_FACILITATOR]

    SetRolePermissionInput:
      type: object
      required: [role, permission, granted]
      description: SUPERADMIN-only (DR-035); role excludes SUPERADMIN itself (never a DB row, always the wildcard)
      properties:
        role:
          type: string
          enum: [PLATFORM_ADMIN, TOUR_OPERATOR, TOUR_GUIDE, DRIVER, VEHICLE_OWNER, VISA_FACILITATOR, TOURIST]
        permission: { type: string, description: 'A Permission literal, e.g. catalog.write' }
        granted: { type: boolean }

    Vehicle:
      type: object
      description: Fleet + compliance (DR-017). No link to Departure/Booking yet -- that's Assignments, a later Phase 2 increment.
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        ownerId: { type: string, format: uuid, nullable: true, description: VEHICLE_OWNER user; null = operator-owned }
        plateNumber: { type: string }
        vin: { type: string, nullable: true, description: Chassis/VIN (DR-029) -- distinct from plateNumber. }
        make: { type: string }
        model: { type: string }
        year: { type: integer, nullable: true }
        vehicleType: { type: string, description: 'Open-ended (sedan/minibus/4x4/boat...), not an enum' }
        seatCapacity: { type: integer }
        status: { type: string, enum: [ACTIVE, MAINTENANCE, RETIRED] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateVehicleInput:
      type: object
      required: [plateNumber, make, model, vehicleType, seatCapacity]
      properties:
        ownerId: { type: string, format: uuid }
        plateNumber: { type: string, minLength: 1, maxLength: 32 }
        vin: { type: string, minLength: 1, maxLength: 64 }
        make: { type: string, minLength: 1, maxLength: 100 }
        model: { type: string, minLength: 1, maxLength: 100 }
        year: { type: integer, minimum: 1 }
        vehicleType: { type: string, minLength: 1, maxLength: 50 }
        seatCapacity: { type: integer, minimum: 1 }

    UpdateVehicleInput:
      allOf:
        - $ref: '#/components/schemas/CreateVehicleInput'
        - type: object
          properties:
            status: { type: string, enum: [ACTIVE, MAINTENANCE, RETIRED] }
      description: All fields optional (partial update).

    DriverProfile:
      type: object
      description: 1:1 with a DRIVER-role User (DR-017).
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        licenseNumber: { type: string }
        licenseExpiresAt: { type: string, format: date-time, nullable: true }
        languages: { type: array, items: { type: string }, description: 'ISO-639-1 codes, e.g. ["en","fr"] (DR-029)' }
        status: { type: string, enum: [ACTIVE, SUSPENDED] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateDriverProfileInput:
      type: object
      required: [userId, licenseNumber]
      properties:
        userId: { type: string, format: uuid }
        licenseNumber: { type: string, minLength: 1, maxLength: 100 }
        licenseExpiresAt: { type: string, format: date-time }
        languages: { type: array, items: { type: string, minLength: 2, maxLength: 2 } }

    UpdateDriverProfileInput:
      type: object
      properties:
        licenseNumber: { type: string, minLength: 1, maxLength: 100 }
        licenseExpiresAt: { type: string, format: date-time }
        languages: { type: array, items: { type: string, minLength: 2, maxLength: 2 } }
        status: { type: string, enum: [ACTIVE, SUSPENDED] }

    GuideProfile:
      type: object
      description: 1:1 with a TOUR_GUIDE-role User (Guides Module, DR-030). Folded into the fleet module.
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        userId: { type: string, format: uuid }
        languages: { type: array, items: { type: string }, description: 'ISO-639-1 codes, e.g. ["en","fr"]' }
        specialties: { type: array, items: { type: string }, description: 'Freeform, e.g. ["wildlife","gorilla trekking"]' }
        status: { type: string, enum: [ACTIVE, SUSPENDED] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateGuideProfileInput:
      type: object
      required: [userId]
      properties:
        userId: { type: string, format: uuid }
        languages: { type: array, items: { type: string, minLength: 2, maxLength: 2 } }
        specialties: { type: array, items: { type: string, minLength: 1, maxLength: 50 } }

    UpdateGuideProfileInput:
      type: object
      properties:
        languages: { type: array, items: { type: string, minLength: 2, maxLength: 2 } }
        specialties: { type: array, items: { type: string, minLength: 1, maxLength: 50 } }
        status: { type: string, enum: [ACTIVE, SUSPENDED] }

    MaintenanceRecord:
      type: object
      description: Append-only maintenance log per vehicle (DR-029). No scheduled/due-date concept yet.
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        vehicleId: { type: string, format: uuid }
        performedAt: { type: string, format: date-time }
        description: { type: string }
        costMinor: { type: integer, nullable: true }
        currency: { type: string, enum: [USD, EUR, NAD, CDF], nullable: true, description: Given together with costMinor, or not at all. }
        createdAt: { type: string, format: date-time }

    CreateMaintenanceRecordInput:
      type: object
      required: [performedAt, description]
      properties:
        performedAt: { type: string, format: date-time }
        description: { type: string, minLength: 1, maxLength: 500 }
        costMinor: { type: integer, minimum: 0 }
        currency: { type: string, enum: [USD, EUR, NAD, CDF] }

    StarlinkKit:
      type: object
      description: >-
        A Starlink kit is a fleet resource in its own right (DR-029), 1:1 with
        the Vehicle it's mounted in. lastLatitude/lastLongitude/lastLocationAt
        are staff-entered for now -- no live Starlink API integration exists
        yet (OI-09).
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        kitId: { type: string, description: "Starlink's own serial/kit identifier, staff-entered" }
        status: { type: string, enum: [ACTIVE, INACTIVE, MAINTENANCE] }
        vehicleId: { type: string, format: uuid, nullable: true }
        lastLatitude: { type: number, nullable: true }
        lastLongitude: { type: number, nullable: true }
        lastLocationAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateStarlinkKitInput:
      type: object
      required: [kitId]
      properties:
        kitId: { type: string, minLength: 1, maxLength: 100 }
        vehicleId: { type: string, format: uuid }

    UpdateStarlinkKitInput:
      type: object
      properties:
        status: { type: string, enum: [ACTIVE, INACTIVE, MAINTENANCE] }
        vehicleId: { type: string, format: uuid, nullable: true }

    SetStarlinkLocationInput:
      type: object
      required: [latitude, longitude]
      properties:
        latitude: { type: number, minimum: -90, maximum: 90 }
        longitude: { type: number, minimum: -180, maximum: 180 }

    SetDeparturePickupLocationInput:
      type: object
      required: [latitude, longitude]
      properties:
        latitude: { type: number, minimum: -90, maximum: 90 }
        longitude: { type: number, minimum: -180, maximum: 180 }

    AssignmentRecommendation:
      type: object
      description: >-
        DR-029. A simple, transparent rules-based recommendation -- NOT the
        "AI assignment engine" this project's roadmap lists as Phase 3.
        Drivers are eligibility-filtered only (no rating data exists to rank
        them by).
      properties:
        vehicles:
          type: array
          items:
            type: object
            properties:
              vehicle: { $ref: '#/components/schemas/Vehicle' }
              score: { type: number, description: '0-1, equal-weighted average of available factors' }
        drivers:
          type: array
          items: { $ref: '#/components/schemas/DriverProfile' }
        recommendedVehicleId: { type: string, format: uuid, nullable: true }
        recommendedDriverId: { type: string, format: uuid, nullable: true }

    Assignment:
      type: object
      description: Links a Departure to the vehicle/driver/guide staffing it (DR-018).
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        departureId: { type: string, format: uuid }
        vehicleId: { type: string, format: uuid }
        driverProfileId: { type: string, format: uuid }
        guideUserId: { type: string, format: uuid, nullable: true, description: TOUR_GUIDE-role user; optional }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateAssignmentInput:
      type: object
      required: [vehicleId, driverProfileId]
      properties:
        vehicleId: { type: string, format: uuid }
        driverProfileId: { type: string, format: uuid }
        guideUserId: { type: string, format: uuid }

    VisaApplication:
      type: object
      description: Facilitator-facing view (DR-019).
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        travelerId: { type: string, format: uuid }
        country: { type: string, description: 'ISO-3166 alpha-2, destination -- snapshotted at submit time' }
        status: { type: string, enum: [SUBMITTED, APPROVED, REJECTED] }
        rejectionReason: { type: string, nullable: true, description: 'Set only while REJECTED; cleared on resubmit or a later APPROVED decision (DR-025)' }
        resubmissionCount: { type: integer, description: 'Display-only counter, bumped by /visa/resubmit (DR-025)' }
        documentId: { type: string, format: uuid, nullable: true, description: The granted visa document }
        submittedAt: { type: string, format: date-time }
        decidedAt: { type: string, format: date-time, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    DecideVisaInput:
      type: object
      required: [outcome]
      properties:
        outcome: { type: string, enum: [APPROVED, REJECTED] }
        reason: { type: string, maxLength: 500, description: 'Only persisted when outcome is REJECTED (DR-025)' }

    ContactTravelerInput:
      type: object
      required: [message]
      properties:
        message: { type: string, minLength: 1, maxLength: 1000 }

    FacilitatorVisaView:
      type: object
      description: >-
        VISA_FACILITATOR's own whole-org visa queue (My Schedule, DR-031) --
        includes rejectionReason and travelerId since this role already
        holds unscoped visa.process; documentId itself still isn't exposed,
        only hasDocument. travelStartDate and bookingId (DR-034, needed for
        the contact/request-documents actions) are both resolved live via
        Traveler -> Booking -> Departure (or Booking.customTravelStart for a
        TAILOR_MADE booking), null if that chain can't be resolved for this
        caller.
      properties:
        id: { type: string, format: uuid }
        travelerId: { type: string, format: uuid }
        bookingId: { type: string, format: uuid, nullable: true }
        travelerFirstName: { type: string }
        travelerLastName: { type: string }
        travelerNationality: { type: string }
        travelerIdOrPassportNumber: { type: string }
        country: { type: string }
        status: { type: string, enum: [SUBMITTED, APPROVED, REJECTED] }
        rejectionReason: { type: string, nullable: true }
        resubmissionCount: { type: integer }
        hasDocument: { type: boolean }
        submittedAt: { type: string, format: date-time }
        decidedAt: { type: string, format: date-time, nullable: true }
        travelStartDate: { type: string, format: date-time, nullable: true }

    Itinerary:
      type: object
      description: >-
        "The operational plan for the entire tour" (Itinerary Management,
        DR-033) -- 1:1 with a Booking. Does NOT include vehicle/driver/guide
        assignment data (that stays owned by the assignment module, GET
        /departures/{id}/assignments) since it's shared across every booking
        on a PREDEFINED_PACKAGE departure, not 1:1 with any single Itinerary.
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        bookingId: { type: string, format: uuid }
        status: { type: string, enum: [DRAFT, IN_REVIEW, APPROVED] }
        notes: { type: string, nullable: true }
        emergencyContactName: { type: string, nullable: true, description: Trip-level, not per-traveler (see Traveler.emergencyContactName, DR-030) }
        emergencyContactPhone: { type: string, nullable: true }
        emergencyContactRelation: { type: string, nullable: true }
        approvedAt: { type: string, format: date-time, nullable: true }
        approvedByUserId: { type: string, format: uuid, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateItineraryInput:
      type: object
      properties:
        notes: { type: string, maxLength: 2000 }
        emergencyContactName: { type: string, maxLength: 200 }
        emergencyContactPhone: { type: string, maxLength: 50 }
        emergencyContactRelation: { type: string, maxLength: 100 }

    UpdateItineraryInput:
      type: object
      properties:
        notes: { type: string, maxLength: 2000 }
        emergencyContactName: { type: string, maxLength: 200 }
        emergencyContactPhone: { type: string, maxLength: 50 }
        emergencyContactRelation: { type: string, maxLength: 100 }

    ItineraryDay:
      type: object
      description: One row per calendar day of the trip (DR-033).
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        itineraryId: { type: string, format: uuid }
        dayNumber: { type: integer, minimum: 1 }
        date: { type: string, format: date-time }
        departureTime: { type: string, nullable: true, description: 'Plain "HH:MM" 24h, no timezone' }
        arrivalTime: { type: string, nullable: true }
        pickupLocation: { type: string, nullable: true }
        dropoffLocation: { type: string, nullable: true }
        plannedSites: { type: string, nullable: true }
        activities: { type: string, nullable: true }
        estimatedTravelMinutes: { type: integer, nullable: true }
        notes: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    AddItineraryDayInput:
      type: object
      required: [dayNumber, date]
      properties:
        dayNumber: { type: integer, minimum: 1 }
        date: { type: string, format: date }
        departureTime: { type: string, pattern: '^([01]\d|2[0-3]):([0-5]\d)$' }
        arrivalTime: { type: string, pattern: '^([01]\d|2[0-3]):([0-5]\d)$' }
        pickupLocation: { type: string, maxLength: 500 }
        dropoffLocation: { type: string, maxLength: 500 }
        plannedSites: { type: string, maxLength: 2000 }
        activities: { type: string, maxLength: 2000 }
        estimatedTravelMinutes: { type: integer, minimum: 0 }
        notes: { type: string, maxLength: 2000 }

    UpdateItineraryDayInput:
      type: object
      description: Same fields as AddItineraryDayInput, minus dayNumber, all optional.
      properties:
        date: { type: string, format: date }
        departureTime: { type: string, pattern: '^([01]\d|2[0-3]):([0-5]\d)$' }
        arrivalTime: { type: string, pattern: '^([01]\d|2[0-3]):([0-5]\d)$' }
        pickupLocation: { type: string, maxLength: 500 }
        dropoffLocation: { type: string, maxLength: 500 }
        plannedSites: { type: string, maxLength: 2000 }
        activities: { type: string, maxLength: 2000 }
        estimatedTravelMinutes: { type: integer, minimum: 0 }
        notes: { type: string, maxLength: 2000 }

    Hotel:
      type: object
      description: >-
        Lightweight reusable reference entity (Itinerary Management, DR-033)
        -- name/contact info only, no compliance tracking like the fleet
        module's Vehicle/DriverProfile have.
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        name: { type: string }
        country: { type: string, description: ISO-3166 alpha-2 }
        address: { type: string, nullable: true }
        contactName: { type: string, nullable: true }
        contactPhone: { type: string, nullable: true }
        contactEmail: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateHotelInput:
      type: object
      required: [name, country]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        country: { type: string, minLength: 2, maxLength: 2 }
        address: { type: string, maxLength: 500 }
        contactName: { type: string, maxLength: 200 }
        contactPhone: { type: string, maxLength: 50 }
        contactEmail: { type: string, format: email }

    UpdateHotelInput:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        country: { type: string, minLength: 2, maxLength: 2 }
        address: { type: string, maxLength: 500 }
        contactName: { type: string, maxLength: 200 }
        contactPhone: { type: string, maxLength: 50 }
        contactEmail: { type: string, format: email }

    Restaurant:
      type: object
      description: Same shape as Hotel (Itinerary Management, DR-033).
      properties:
        id: { type: string, format: uuid }
        organizationId: { type: string, format: uuid }
        name: { type: string }
        country: { type: string, description: ISO-3166 alpha-2 }
        address: { type: string, nullable: true }
        contactName: { type: string, nullable: true }
        contactPhone: { type: string, nullable: true }
        contactEmail: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateRestaurantInput:
      type: object
      required: [name, country]
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        country: { type: string, minLength: 2, maxLength: 2 }
        address: { type: string, maxLength: 500 }
        contactName: { type: string, maxLength: 200 }
        contactPhone: { type: string, maxLength: 50 }
        contactEmail: { type: string, format: email }

    UpdateRestaurantInput:
      type: object
      properties:
        name: { type: string, minLength: 1, maxLength: 200 }
        country: { type: string, minLength: 2, maxLength: 2 }
        address: { type: string, maxLength: 500 }
        contactName: { type: string, maxLength: 200 }
        contactPhone: { type: string, maxLength: 50 }
        contactEmail: { type: string, format: email }

    CountryRegulation:
      type: object
      description: >-
        Platform-wide reference data, one row per country (Immigration
        Module, DR-034) -- no organizationId, same precedent as TaxRate.
        Write is SUPERADMIN-only (country_regulation.write, enforced past
        the route gate in immigration/service.ts).
      properties:
        id: { type: string, format: uuid }
        country: { type: string, minLength: 2, maxLength: 2, description: ISO-3166 alpha-2, unique }
        visaRequirements: { type: string }
        requiredDocuments: { type: string }
        processingTimeDays: { type: integer, nullable: true }
        entryConditions: { type: string }
        immigrationFeeMinor: { type: integer, nullable: true, description: Integer minor units (BR-02), paired with feeCurrency }
        feeCurrency: { type: string, enum: [USD, EUR, NAD, CDF], nullable: true }
        embassyName: { type: string, nullable: true }
        embassyAddress: { type: string, nullable: true }
        embassyPhone: { type: string, nullable: true }
        embassyEmail: { type: string, nullable: true }
        healthRequirements: { type: string }
        travelAdvisories: { type: string, nullable: true }
        specialRestrictions: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }

    CreateCountryRegulationInput:
      type: object
      required: [country, visaRequirements, requiredDocuments, entryConditions, healthRequirements]
      properties:
        country: { type: string, minLength: 2, maxLength: 2 }
        visaRequirements: { type: string, minLength: 1 }
        requiredDocuments: { type: string, minLength: 1 }
        processingTimeDays: { type: integer, minimum: 0 }
        entryConditions: { type: string, minLength: 1 }
        immigrationFeeMinor: { type: integer, minimum: 0 }
        feeCurrency: { type: string, enum: [USD, EUR, NAD, CDF] }
        embassyName: { type: string, maxLength: 200 }
        embassyAddress: { type: string, maxLength: 500 }
        embassyPhone: { type: string, maxLength: 50 }
        embassyEmail: { type: string, format: email }
        healthRequirements: { type: string, minLength: 1 }
        travelAdvisories: { type: string }
        specialRestrictions: { type: string }

    UpdateCountryRegulationInput:
      type: object
      description: Same as CreateCountryRegulationInput minus country (the natural key, immutable after creation), all optional.
      properties:
        visaRequirements: { type: string, minLength: 1 }
        requiredDocuments: { type: string, minLength: 1 }
        processingTimeDays: { type: integer, minimum: 0 }
        entryConditions: { type: string, minLength: 1 }
        immigrationFeeMinor: { type: integer, minimum: 0 }
        feeCurrency: { type: string, enum: [USD, EUR, NAD, CDF] }
        embassyName: { type: string, maxLength: 200 }
        embassyAddress: { type: string, maxLength: 500 }
        embassyPhone: { type: string, maxLength: 50 }
        embassyEmail: { type: string, format: email }
        healthRequirements: { type: string, minLength: 1 }
        travelAdvisories: { type: string }
        specialRestrictions: { type: string }
